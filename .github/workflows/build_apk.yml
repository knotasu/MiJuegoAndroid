name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 9477386
    
    - name: Install NDK and CMake
      run: |
        sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"
    
    - name: Compile raylib for Android
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git
        cd raylib/src
        make clean
        make PLATFORM=PLATFORM_ANDROID \
             ANDROID_NDK=$ANDROID_HOME/ndk/25.1.8937393 \
             ANDROID_ARCH=arm64 \
             ANDROID_API_VERSION=29
        mkdir -p ${{ github.workspace }}/app/libs/arm64-v8a
        cp libraylib.a ${{ github.workspace }}/app/libs/arm64-v8a/
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MiJuego-APK
        path: app/build/outputs/apk/debug/*.apk
